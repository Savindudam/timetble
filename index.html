<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>THRENOX – Focus Flow</title>
  <!-- Inter & DM Serif Display fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --border: #E2E8F0;
      --text: #1E293B;
      --text-secondary: #64748B;
      --accent: #2563EB;
      --accent-light: #DBEAFE;
      --success: #22C55E;
      --warning: #F59E0B;
      --glass-bg: rgba(255,255,255,0.7);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
      --radius: 24px;
      --radius-sm: 16px;
      --transition: 0.2s cubic-bezier(0.25, 1, 0.3, 1);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      flex-shrink: 0;
      z-index: 20;
      transition: width 0.3s;
    }

    .sidebar-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      text-align: center;
      color: var(--text);
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
      user-select: none;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.7rem 1rem;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      text-align: left;
      width: 100%;
    }

    .sidebar-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      stroke: currentColor;
    }

    .sidebar-btn:hover {
      background: rgba(37,99,235,0.05);
      color: var(--accent);
    }

    .sidebar-btn.active {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      flex-shrink: 0;
    }

    .greeting {
      font-weight: 600;
      font-size: 1.3rem;
      color: var(--text);
    }

    .date-time {
      text-align: right;
    }

    .date-display {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .live-clock {
      font-size: 1.1rem;
      font-weight: 600;
      background: var(--accent-light);
      color: var(--accent);
      padding: 0.25rem 0.9rem;
      border-radius: 20px;
      margin-top: 0.2rem;
      display: inline-block;
    }

    /* ===== PROGRESS BAR ===== */
    .progress-bar-container {
      height: 4px;
      background: var(--border);
      flex-shrink: 0;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.5s ease;
    }

    /* ===== VIEWS ===== */
    .view {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: none;
      scroll-behavior: smooth;
    }

    .view.active {
      display: block;
    }

    /* ===== DASHBOARD ===== */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .card-widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition);
    }

    .card-widget:hover {
      box-shadow: var(--shadow-md);
    }

    .current-task-widget {
      grid-column: span 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .progress-ring-container {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .progress-ring {
      width: 100px;
      height: 100px;
    }

    .progress-ring-circle {
      fill: none;
      stroke: var(--border);
      stroke-width: 8;
    }

    .progress-ring-fill {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset 0.5s ease;
    }

    .progress-ring-text {
      font-size: 1.4rem;
      font-weight: 700;
      fill: var(--text);
    }

    .current-task-details h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      font-weight: 500;
      color: var(--text);
    }

    .current-task-details p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    /* IOI Macro Progress Widget */
    .ioi-progress-widget {
      grid-column: span 2;
      background: linear-gradient(135deg, #1E293B, #0F172A);
      color: white;
      border: none;
    }
    .ioi-progress-widget h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #F8FAFC;
    }
    .ioi-progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #94A3B8;
      margin-bottom: 0.75rem;
    }
    .ioi-bar-bg {
      height: 8px;
      background: #334155;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .ioi-bar-fill {
      height: 100%;
      background: var(--success);
      width: 0%;
      transition: width 0.4s ease;
    }

    .stats-widget {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
    }

    .stat-label { color: var(--text-secondary); }
    .stat-value { font-weight: 600; }

    .focus-time {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* Countdown Widget Styling */
    .countdown-widget {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 0.5rem;
    }

    .countdown-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .countdown-timer {
      display: flex;
      gap: 0.8rem;
    }

    .timer-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .timer-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .timer-label {
      font-size: 0.65rem;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    /* ===== TIMELINE (Timetable) ===== */
    .timeline {
      position: relative;
      padding-left: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0.75rem;
      top: 0.5rem;
      bottom: 0.5rem;
      width: 2px;
      background: var(--border);
    }

    .timeline-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.8rem;
      position: relative;
      opacity: 0.6;
      transition: all var(--transition);
    }

    .timeline-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--border);
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      margin-top: 0.35rem;
      border: 2px solid white;
      box-shadow: 0 0 0 2px var(--border);
      transition: all var(--transition);
    }

    .timeline-item.current {
      opacity: 1;
    }

    .timeline-item.current .timeline-dot {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(37,99,235,0.2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37,99,235,0.4); }
      70% { box-shadow: 0 0 0 8px rgba(37,99,235,0); }
      100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); }
    }

    .timeline-item.completed .timeline-dot {
      background: var(--success);
      box-shadow: 0 0 0 2px var(--success);
    }

    .timeline-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.2rem;
      flex: 1;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .timeline-item.current .timeline-content {
      border-color: var(--accent-light);
      background: var(--accent-light);
    }

    .timeline-time {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .timeline-task {
      font-weight: 600;
      color: var(--text);
    }

    .status-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.6rem;
      border-radius: 12px;
      background: #F1F5F9;
      color: #64748B;
      margin-left: 0.5rem;
    }

    .current .status-badge {
      background: var(--accent);
      color: white;
    }

    .completed .status-badge {
      background: #DCFCE7;
      color: #166534;
    }

    /* ===== TODO VIEW ===== */
    .todo-container {
      max-width: 600px;
      margin: 0 auto;
    }

    .todo-input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .todo-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .todo-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(37,99,235,0.2);
    }

    .todo-add-btn {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
    }

    .todo-add-btn:hover {
      background: #1D4ED8;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1rem;
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .todo-checkbox {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .todo-delete {
      background: none;
      border: none;
      color: #94A3B8;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .todo-delete:hover {
      color: #EF4444;
    }

    /* ===== IOI PLAN VIEW SYSTEM ===== */
    .ioi-container {
      max-width: 750px;
      margin: 0 auto;
    }
    .ioi-week-section {
      margin-bottom: 2rem;
    }
    .ioi-week-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--text);
      margin-bottom: 1rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.25rem;
    }
    .ioi-day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.2rem;
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow-sm);
    }
    .ioi-day-header {
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }
    .ioi-subtask-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding-left: 0.25rem;
    }
    .ioi-subtask-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.4;
    }
    .ioi-subtask-item input {
      margin-top: 0.2rem;
      width: 16px;
      height: 16px;
      accent-color: var(--success);
      cursor: pointer;
    }
    .ioi-subtask-item.checked span {
      text-decoration: line-through;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    /* ===== PROGRESS (STATS) VIEW ===== */
    .stats-container {
      max-width: 600px;
      margin: 0 auto;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow-sm);
    }

    /* ===== RESET BUTTON (FAB) ===== */
    .fab {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 52px;
      height: 52px;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(37,99,235,0.4);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .fab:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 24px rgba(37,99,235,0.5);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar {
        width: 80px;
        padding: 1rem 0.5rem;
      }
      .sidebar-btn {
        justify-content: center;
        padding: 0.7rem 0;
      }
      .sidebar-btn span:not(.icon-only) {
        display: none;
      }
      .sidebar-logo {
        font-size: 1.2rem;
      }
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      .current-task-widget {
        grid-column: span 1;
      }
      .top-bar {
        padding: 1rem;
      }
      .view {
        padding: 1rem;
      }
    }

    @media (max-width: 480px) {
      .sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 70px;
        flex-direction: row;
        justify-content: space-around;
        border-top: 1px solid var(--border);
        border-right: none;
        padding: 0.5rem 0;
        background: var(--surface);
        backdrop-filter: blur(16px);
        z-index: 50;
      }
      .sidebar-logo { display: none; }
      .sidebar-nav { flex-direction: row; gap: 0; }
      .sidebar-btn {
        flex-direction: column;
        gap: 0.2rem;
        font-size: 0.7rem;
        padding: 0.4rem 0.5rem;
      }
      .sidebar-btn svg { width: 18px; height: 18px; }
      .main { padding-bottom: 70px; }
      .fab { bottom: 5rem; right: 1.5rem; }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">THRENOX</div>
    <nav class="sidebar-nav">
      <button class="sidebar-btn active" data-view="dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span class="icon-only">Dashboard</span>
      </button>
      <button class="sidebar-btn" data-view="ioiplan">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        <span class="icon-only">IOI Plan</span>
      </button>
      <button class="sidebar-btn" data-view="timetable">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="icon-only">Timetable</span>
      </button>
      <button class="sidebar-btn" data-view="todo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span class="icon-only">To Do</span>
      </button>
      <button class="sidebar-btn" data-view="progress">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        <span class="icon-only">Progress</span>
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="main" id="mainContent">
    <div class="top-bar">
      <div class="greeting" id="greetingMessage">Good Evening, Savindu</div>
      <div class="date-time">
        <div class="date-display" id="dateDisplay"></div>
        <div class="live-clock" id="liveClock"></div>
      </div>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progressBarFill"></div>
    </div>

    <!-- Dashboard View -->
    <div class="view active" id="dashboardView">
      <div class="dashboard-grid">
        <div class="card-widget current-task-widget" id="currentTaskWidget">
          <div class="progress-ring-container">
            <svg class="progress-ring" viewBox="0 0 100 100">
              <circle class="progress-ring-circle" cx="50" cy="50" r="42"/>
              <circle class="progress-ring-fill" id="progressRingFill" cx="50" cy="50" r="42" stroke-dasharray="263.89" stroke-dashoffset="263.89"/>
              <text x="50" y="50" text-anchor="middle" dy="7" class="progress-ring-text" id="progressPercent">0%</text>
            </svg>
            <div class="current-task-details">
              <h3 id="currentTaskName">---</h3>
              <p id="currentTaskTime">--:-- - --:--</p>
            </div>
          </div>
        </div>

        <!-- IOI Plan Macro Card -->
        <div class="card-widget ioi-progress-widget">
          <h3>IOI 2027 Foundation Progress (Month 1)</h3>
          <div class="ioi-progress-header">
            <span id="ioiWidgetProgressText">0 / 0 Tasks Completed</span>
            <span id="ioiWidgetPercentText">0%</span>
          </div>
          <div class="ioi-bar-bg">
            <div class="ioi-bar-fill" id="ioiWidgetBarFill"></div>
          </div>
        </div>

        <!-- AL Countdown Widget -->
        <div class="card-widget countdown-widget">
          <div class="countdown-title">AL 2028 Countdown</div>
          <div class="countdown-timer" id="alCountdown">
            <div class="timer-unit"><span class="timer-value" id="al-days">00</span><span class="timer-label">Days</span></div>
            <div class="timer-unit"><span class="timer-value" id="al-hours">00</span><span class="timer-label">Hrs</span></div>
            <div class="timer-unit"><span class="timer-value" id="al-mins">00</span><span class="timer-label">Min</span></div>
          </div>
        </div>

        <!-- IOI Countdown Widget -->
        <div class="card-widget countdown-widget">
          <div class="countdown-title">IOI 2027 Countdown</div>
          <div class="countdown-timer" id="ioiCountdown">
            <div class="timer-unit"><span class="timer-value" id="ioi-days">00</span><span class="timer-label">Days</span></div>
            <div class="timer-unit"><span class="timer-value" id="ioi-hours">00</span><span class="timer-label">Hrs</span></div>
            <div class="timer-unit"><span class="timer-value" id="ioi-mins">00</span><span class="timer-label">Min</span></div>
          </div>

    const dayOrder = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    let dailyTasks = [];
    let currentDay = "";

    function timeToMinutes(str) {
      const [h,m] = str.split(':').map(Number);
      return h*60 + m;
    }

    function getCurrentTaskIndex() {
      const now = new Date();
      const currentMin = now.getHours()*60 + now.getMinutes();
      const idx = dailyTasks.findIndex(t => currentMin >= t.startMin && currentMin < t.endMin);
      return idx === -1 ? 0 : idx;
    }

    // ===== Render IOI Plan Tracker =====
    function initAndRenderIOIPlan() {
      const container = document.getElementById("ioiPlanContainer");
      container.innerHTML = "";
      
      let totalTasks = 0;
      let completedTasks = 0;

      ioiPlanData.forEach((weekObj, wIdx) => {
        const weekSec = document.createElement("div");
        weekSec.className = "ioi-week-section";
        
        const wTitle = document.createElement("div");
        wTitle.className = "ioi-week-title";
        wTitle.textContent = weekObj.week;
        weekSec.appendChild(wTitle);

        weekObj.days.forEach((dayObj, dIdx) => {
          const dayCard = document.createElement("div");
          dayCard.className = "ioi-day-card";
          
          const dHeader = document.createElement("div");
          dHeader.className = "ioi-day-header";
          dHeader.textContent = dayObj.date;
          dayCard.appendChild(dHeader);

          const taskList = document.createElement("ul");
          taskList.className = "ioi-subtask-list";

          dayObj.tasks.forEach((taskText, tIdx) => {
            totalTasks++;
            const taskId = `ioi-t-${wIdx}-${dIdx}-${tIdx}`;
            const isChecked = localStorage.getItem(taskId) === "true";
            if (isChecked) completedTasks++;

            const li = document.createElement("li");
            li.className = `ioi-subtask-item ${isChecked ? 'checked' : ''}`;
            
            const check = document.createElement("input");
            check.type = "checkbox";
            check.checked = isChecked;
            
            check.addEventListener("change", (e) => {
              localStorage.setItem(taskId, e.target.checked);
              if (e.target.checked) {
                li.classList.add("checked");
              } else {
                li.classList.remove("checked");
              }
              calculateIOIProgress();
            });

            const span = document.createElement("span");
            span.textContent = taskText;

            li.appendChild(check);
            li.appendChild(span);
            taskList.appendChild(li);
          });

          dayCard.appendChild(taskList);
          weekSec.appendChild(dayCard);
        });

        container.appendChild(weekSec);
      });

      // Update macro metrics values
      updateIOIMetricsUI(completedTasks, totalTasks);
    }

    function calculateIOIProgress() {
      let totalTasks = 0;
      let completedTasks = 0;

      ioiPlanData.forEach((weekObj, wIdx) => {
        weekObj.days.forEach((dayObj, dIdx) => {
          dayObj.tasks.forEach((_, tIdx) => {
            totalTasks++;
            const taskId = `ioi-t-${wIdx}-${dIdx}-${tIdx}`;
            if (localStorage.getItem(taskId) === "true") {
              completedTasks++;
            }
          });
        });
      });

      updateIOIMetricsUI(completedTasks, totalTasks);
    }

    function updateIOIMetricsUI(completed, total) {
      const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
      document.getElementById("ioiWidgetProgressText").textContent = `${completed} / ${total} Tasks Completed`;
      document.getElementById("ioiWidgetPercentText").textContent = `${percent}%`;
      document.getElementById("ioiWidgetBarFill").style.width = `${percent}%`;
    }

    // ===== Build Timeline =====
    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      container.innerHTML = '';
      const raw = timetable[currentDay] || [];
      dailyTasks = raw.map(([start, end, text], idx) => ({
        id: idx,
        startMin: timeToMinutes(start),
        endMin: timeToMinutes(end),
        timeRange: `${start} – ${end}`,
        text
      }));

      const currentIdx = getCurrentTaskIndex();

      dailyTasks.forEach((task, idx) => {
        const item = document.createElement('div');
        item.className = 'timeline-item';
        if (idx === currentIdx) item.classList.add('current');
        else if (idx < currentIdx) item.classList.add('completed');

        let badgeText = 'Upcoming';
        if (idx < currentIdx) badgeText = 'Done';
        else if (idx === currentIdx) badgeText = 'Now';

        item.innerHTML = `
          <div class="timeline-dot"></div>
          <div class="timeline-content">
            <div>
              <div class="timeline-time">${task.timeRange}</div>
              <div class="timeline-task">${task.text}</div>
            </div>
            <span class="status-badge">${badgeText}</span>
          </div>
        `;
        container.appendChild(item);
      });

      setTimeout(() => {
        const currentEl = document.querySelector('.timeline-item.current');
        if (currentEl) {
          currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 100);
    }

    // ===== Dashboard Updates =====
    function updateDashboard() {
      if (dailyTasks.length === 0) return;
      const now = new Date();
      const currentMin = now.getHours()*60 + now.getMinutes();
      const currentIdx = getCurrentTaskIndex();
      const currentTask = dailyTasks[currentIdx];

      document.getElementById('currentTaskName').textContent = currentTask.text;
      document.getElementById('currentTaskTime').textContent = currentTask.timeRange;

      const totalTaskMin = currentTask.endMin - currentTask.startMin;
      const elapsedMin = Math.max(0, currentMin - currentTask.startMin);
      const percent = totalTaskMin > 0 ? Math.min(100, Math.round((elapsedMin / totalTaskMin)*100)) : 0;
      const circle = document.getElementById('progressRingFill');
      const circumference = 2 * Math.PI * 42; 
      circle.style.strokeDashoffset = circumference - (percent / 100) * circumference;
      document.getElementById('progressPercent').textContent = percent + '%';

      const completed = dailyTasks.filter((_,i) => i < currentIdx).length;
      const remaining = dailyTasks.length - completed - 1;
      document.getElementById('statTasks').textContent = dailyTasks.length;
      document.getElementById('statCompleted').textContent = completed;
      document.getElementById('statRemaining').textContent = remaining;

      const firstStart = dailyTasks[0].startMin;
      const lastEnd = dailyTasks[dailyTasks.length-1].endMin;
      const totalDayMin = lastEnd - firstStart;
      const hours = Math.floor(totalDayMin / 60);
      const mins = totalDayMin % 60;
      document.getElementById('focusTime').textContent = `${hours}h ${mins}m`;

      const elapsedDayMin = Math.max(0, currentMin - firstStart);
      const dayProgress = totalDayMin > 0 ? Math.min(100, (elapsedDayMin / totalDayMin)*100) : 0;
      document.getElementById('progressBarFill').style.width = dayProgress + '%';

      updateCountdowns();
    }

    function updateCountdowns() {
      const now = new Date().getTime();
      const alTarget = new Date("August 14, 2028 00:00:00").getTime();
      const alDist = alTarget - now;
      if (alDist > 0) {
        document.getElementById('al-days').textContent = Math.floor(alDist / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
        document.getElementById('al-hours').textContent = Math.floor((alDist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        document.getElementById('al-mins').textContent = Math.floor((alDist % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
      }

      const ioiTarget = new Date("September 12, 2027 00:00:00").getTime();
      const ioiDist = ioiTarget - now;
      if (ioiDist > 0) {
        document.getElementById('ioi-days').textContent = Math.floor(ioiDist / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
        document.getElementById('ioi-hours').textContent = Math.floor((ioiDist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        document.getElementById('ioi-mins').textContent = Math.floor((ioiDist % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
      }
    }

    function updateAllUI() {
      renderTimeline();
      updateDashboard();
      updateDateTime();
    }

    // ===== Sidebar Navigation =====
    const sidebarBtns = document.querySelectorAll('.sidebar-btn');
    const views = {
      dashboard: document.getElementById('dashboardView'),
      ioiplan: document.getElementById('ioiplanView'),
      timetable: document.getElementById('timetableView'),
      todo: document.getElementById('todoView'),
      progress: document.getElementById('progressView')
    };

    sidebarBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        sidebarBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const viewName = btn.dataset.view;
        Object.values(views).forEach(v => v.classList.remove('active'));
        views[viewName].classList.add('active');
        document.getElementById('resetBtn').style.display = (viewName === 'timetable') ? 'flex' : 'none';
        if (viewName === 'timetable') {
          renderTimeline();
        }
      });
    });

    // ===== Todo Logic (Firestore) =====
    const todosRef = db.collection("todos");
    function renderTodos(snapshot) {
      const list = document.getElementById("todoList");
      list.innerHTML = "";
      if (!snapshot) return;
      snapshot.forEach(doc => {
        const todo = doc.data();
        const li = document.createElement("li");
        li.className = "todo-item";
        if (todo.done) li.classList.add("done");
        li.innerHTML = `
          <input type="checkbox" class="todo-checkbox" ${todo.done ? "checked" : ""}>
          <span class="todo-text">${escapeHtml(todo.text)}</span>
          <button class="todo-delete">✕</button>
        `;
        li.querySelector(".todo-checkbox").addEventListener("change", (e) => {
          todosRef.doc(doc.id).update({ done: e.target.checked });
        });
        li.querySelector(".todo-delete").addEventListener("click", () => {
          todosRef.doc(doc.id).delete();
        });
        list.appendChild(li);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById("todoAddBtn").addEventListener("click", async () => {
      const input = document.getElementById("todoInput");
      const text = input.value.trim();
      if (!text) return;
      await todosRef.add({ text, done: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      input.value = "";
    });

    document.getElementById("todoInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("todoAddBtn").click();
    });

    todosRef.orderBy("createdAt", "asc").onSnapshot(renderTodos);

    // ===== Greeting & Clock =====
    function updateGreeting() {
      const hour = new Date().getHours();
      let greeting = "Good Evening";
      if (hour < 12) greeting = "Good Morning";
      else if (hour < 17) greeting = "Good Afternoon";
      document.getElementById('greetingMessage').textContent = `${greeting}, Savindu`;
    }

    function updateDateTime() {
      const now = new Date();
      const dayName = dayOrder[now.getDay()];
      document.getElementById('dateDisplay').textContent = now.toLocaleDateString(undefined, {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      document.getElementById('liveClock').textContent = now.toLocaleTimeString(undefined, {
        hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
      if (dayName !== currentDay) {
        currentDay = dayName;
        updateAllUI();
      } else {
        updateDashboard();
      }
    }

    document.getElementById('resetBtn').addEventListener('click', () => {
      if (!views.timetable.classList.contains('active')) {
        sidebarBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-view="timetable"]').classList.add('active');
        Object.values(views).forEach(v => v.classList.remove('active'));
        views.timetable.classList.add('active');
        document.getElementById('resetBtn').style.display = 'flex';
      }
      renderTimeline();
    });

    // ===== Init =====
    function init() {
      const now = new Date();
      currentDay = dayOrder[now.getDay()];
      initAndRenderIOIPlan();
      updateAllUI();
      updateDateTime();
      setInterval(updateDateTime, 1000);
    }

    init();
  </script>
