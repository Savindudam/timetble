<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>THRENOX – Daily Log</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0b0f1c;
      color: #e0e4ff;
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem;
      line-height: 1.5;
    }
    h1 {
      text-align: center;
      color: #a78bfa;
    }
    .day-header {
      text-align: center;
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: #9aa3c7;
    }
    .task {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .task input[type="checkbox"] {
      margin-top: 0.15rem;
      width: 1rem;
      height: 1rem;
      accent-color: #7c5cff;
      flex-shrink: 0;
    }
    .task-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #9aa3c7;
      min-width: 130px;
    }
    .task-text {
      flex: 1;
      font-size: 0.95rem;
    }
    .completed .task-text {
      text-decoration: line-through;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <h1>THRENOX</h1>
  <div class="day-header" id="dayHeader"></div>
  <div id="taskList"></div>

  <script>
    const timetable = {
      Monday: [
        ["4:00 – 5:30 AM","IOI Deep Work (C++/Algo)"],
        ["5:30 – 6:00 AM","Get ready & travel"],
        ["6:00 – 1:30 PM","School"],
        ["1:30 – 2:00 PM","Travel home"],
        ["2:00 – 2:30 PM","Eat + power nap"],
        ["2:30 – 3:00 PM","AL Light Revision (review notes)"],
        ["3:00 – 7:00 PM","Class"],
        ["7:00 – 7:30 PM","Dinner"],
        ["7:30 – 8:30 PM","AL Revision (heavy/past papers)"],
        ["8:30 – 9:00 PM","Wind down (no screens)"],
        ["9:00 PM","SLEEP"]
      ],
      Tuesday: [
        ["4:00 – 5:30 AM","IOI Deep Work"],
        ["5:30 – 6:00 AM","Get ready & travel"],
        ["6:00 – 1:30 PM","School"],
        ["1:30 – 2:00 PM","Travel home"],
        ["2:00 – 2:30 PM","Eat + power nap"],
        ["2:30 – 4:30 PM","AL Intensive Block (hardest subject)"],
        ["4:30 – 5:00 PM","Break (walk/stretch)"],
        ["5:00 – 6:30 PM","Mixed Block (2nd AL or light IOI)"],
        ["6:30 – 7:30 PM","Dinner + quick Discord (optional, 15 min)"],
        ["7:30 – 8:30 PM","AL Recap & plan tomorrow"],
        ["8:30 – 9:00 PM","Wind down"],
        ["9:00 PM","SLEEP"]
      ],
      Wednesday: [
        ["4:00 – 5:30 AM","IOI Deep Work"],
        ["5:30 – 6:00 AM","Get ready & travel"],
        ["6:00 – 1:30 PM","School"],
        ["1:30 – 2:00 PM","Travel home"],
        ["2:00 – 2:30 PM","Eat + power nap"],
        ["2:30 – 4:30 PM","AL Intensive Block (hardest subject)"],
        ["4:30 – 5:00 PM","Break (walk/stretch)"],
        ["5:00 – 6:30 PM","Mixed Block (2nd AL or light IOI)"],
        ["6:30 – 7:30 PM","Dinner + quick Discord (optional, 15 min)"],
        ["7:30 – 8:30 PM","AL Recap & plan tomorrow"],
        ["8:30 – 9:00 PM","Wind down"],
        ["9:00 PM","SLEEP"]
      ],
      Thursday: [
        ["4:00 – 5:30 AM","IOI Deep Work"],
        ["5:30 – 6:00 AM","Get ready & travel"],
        ["6:00 – 1:30 PM","School"],
        ["1:30 – 2:00 PM","Travel home"],
        ["2:00 – 2:30 PM","Eat + power nap"],
        ["2:30 – 4:30 PM","AL Intensive Block (hardest subject)"],
        ["4:30 – 5:00 PM","Break (walk/stretch)"],
        ["5:00 – 6:30 PM","Mixed Block (2nd AL or light IOI)"],
        ["6:30 – 7:30 PM","Dinner + quick Discord (optional, 15 min)"],
        ["7:30 – 8:30 PM","AL Recap & plan tomorrow"],
        ["8:30 – 9:00 PM","Wind down"],
        ["9:00 PM","SLEEP"]
      ],
      Friday: [
        ["4:00 – 5:30 AM","IOI Deep Work"],
        ["5:30 – 6:00 AM","Get ready & travel"],
        ["6:00 – 1:30 PM","School"],
        ["1:30 – 2:00 PM","Travel home"],
        ["2:00 – 2:30 PM","Eat + power nap"],
        ["2:30 – 4:30 PM","AL Intensive Block (hardest subject)"],
        ["4:30 – 5:00 PM","Break (walk/stretch)"],
        ["5:00 – 6:30 PM","Mixed Block (2nd AL or light IOI)"],
        ["6:30 – 7:30 PM","Dinner + quick Discord (optional, 15 min)"],
        ["7:30 – 8:30 PM","AL Recap & plan tomorrow"],
        ["8:30 – 9:00 PM","Wind down"],
        ["9:00 PM","SLEEP"]
      ],
      Saturday: [
        ["6:00 – 7:30 AM","IOI Heavy Block (problems/mini-contest)"],
        ["7:30 – 8:00 AM","Get ready & travel (if needed)"],
        ["8:00 – 11:00 AM","Class"],
        ["11:00 – 11:30 AM","Travel home"],
        ["11:30 – 12:30 PM","AL Revision (targeted weak area)"],
        ["12:30 – 1:30 PM","Lunch/break"],
        ["1:30 – 4:00 PM","IOI Extended Practice (big coding session)"],
        ["4:00 – 4:30 PM","Break"],
        ["4:30 – 6:00 PM","AL Hard Subject (disliked subject)"],
        ["6:00 – 7:00 PM","Dinner/rest"],
        ["7:00 – 8:00 PM","Light AL Recap or Social reward (Discord, no games)"],
        ["8:00 – 8:30 PM","Wind down"],
        ["9:00 PM","SLEEP"]
      ],
      Sunday: [
        ["6:00 – 8:00 AM","IOI Mock Contest / Long Problem (timed)"],
        ["8:00 – 8:30 AM","Breakfast/rest"],
        ["8:30 – 11:00 AM","AL Blitz (all subjects, past papers, summaries)"],
        ["11:00 – 11:30 AM","Break"],
        ["11:30 – 12:30 PM","IOI Theory Deep Dive (no coding, just study)"],
        ["12:30 – 1:30 PM","Lunch/relax"],
        ["1:30 – 2:00 PM","Travel to class (if needed)"],
        ["2:00 – 7:00 PM","Class"],
        ["7:00 – 7:30 PM","Travel home"],
        ["7:30 – 8:30 PM","Wind-down AL review (light)"],
        ["8:30 – 9:00 PM","Wind down"],
        ["9:00 PM","SLEEP"]
      ]
    };

    const dayOrder = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const now = new Date();
    const todayName = dayOrder[now.getDay()];
    const dateString = now.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    document.getElementById("dayHeader").textContent = `${todayName} — ${dateString}`;

    const tasks = timetable[todayName];
    const listEl = document.getElementById("taskList");
    const storageKey = `threnox_${now.toISOString().slice(0,10)}`;

    // Load saved check states from localStorage
    let checkedState = {};
    try {
      checkedState = JSON.parse(localStorage.getItem(storageKey)) || {};
    } catch (e) {}

    tasks.forEach(([time, text], idx) => {
      const div = document.createElement("div");
      div.className = "task";
      if (checkedState[idx]) div.classList.add("completed");

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = !!checkedState[idx];
      cb.addEventListener("change", () => {
        checkedState[idx] = cb.checked;
        localStorage.setItem(storageKey, JSON.stringify(checkedState));
        if (cb.checked) div.classList.add("completed");
        else div.classList.remove("completed");
      });

      const timeSpan = document.createElement("span");
      timeSpan.className = "task-time";
      timeSpan.textContent = time;

      const textSpan = document.createElement("span");
      textSpan.className = "task-text";
      textSpan.textContent = text;

      div.appendChild(cb);
      div.appendChild(timeSpan);
      div.appendChild(textSpan);
      listEl.appendChild(div);
    });
  </script>
</body>
</html>
