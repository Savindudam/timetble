<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>THRENOX – 3‑Card Focus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f7f3ee;
      color: #2d2a26;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 1rem 1rem 0.5rem;
      background: #f7f3ee;
      z-index: 10;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: #2d2a26;
      letter-spacing: 0.02em;
    }

    .date {
      font-size: 0.85rem;
      color: #6b625a;
      margin: 0.2rem 0;
    }

    .live-clock {
      font-size: 0.9rem;
      background: #eae3db;
      display: inline-block;
      padding: 0.25rem 1rem;
      border-radius: 20px;
      color: #6b625a;
    }

    /* Progress */
    .progress-wrap {
      margin: 0.6rem auto 0;
      width: 70%;
      max-width: 300px;
      background: #e0d6cc;
      border-radius: 10px;
      height: 5px;
    }
    .progress-bar {
      height: 100%;
      background: #b08968;
      width: 0%;
      transition: width 0.4s;
    }

    /* Cards container – fills remaining space */
    .cards-view {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: pan-y; /* allow vertical swipe */
    }

    .card {
      position: absolute;
      left: 5%;
      width: 90%;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      background: white;
      border-radius: 28px;
      padding: 1.8rem 1.5rem;
      box-shadow: 0 5px 20px rgba(0,0,0,0.04);
      transition: all 0.45s cubic-bezier(0.25, 0.8, 0.25, 1.2);
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(0,0,0,0.04);
      will-change: transform, opacity;
    }

    .card.top {
      top: 10%;
      transform: translateY(-50%) scale(0.8);
      opacity: 0.6;
      z-index: 1;
    }

    .card.middle {
      top: 50%;
      transform: translateY(-50%) scale(1);
      opacity: 1;
      z-index: 3;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
      border-color: #d9c9b6;
    }

    .card.bottom {
      top: 90%;
      transform: translateY(-50%) scale(0.8);
      opacity: 0.6;
      z-index: 1;
    }

    .card-time {
      font-weight: 600;
      font-size: 0.8rem;
      color: #b08968;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .task-text {
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.4;
      color: #2d2a26;
    }

    .card.middle .task-text {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .status-tag {
      position: absolute;
      top: 1rem;
      right: 1.2rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      background: #f1ede8;
      color: #8c7b6b;
    }
    .card.middle .status-tag {
      background: #e6d9cc;
      color: #6b5241;
    }

    /* Nav buttons (optional, for desktop) */
    .nav-buttons {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1rem;
      z-index: 5;
    }
    .nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #d9c9b6;
      background: white;
      color: #2d2a26;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: all 0.2s;
    }
    .nav-btn:hover {
      background: #f5efe8;
    }

    /* Reset button (floating) */
    .reset-btn {
      position: absolute;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #d9c9b6;
      background: white;
      color: #2d2a26;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>THRENOX</h1>
    <div class="date" id="dateDisplay"></div>
    <div class="live-clock" id="liveClock"></div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="cards-view" id="cardsView">
    <div id="cardTop" class="card top"></div>
    <div id="cardMiddle" class="card middle"></div>
    <div id="cardBottom" class="card bottom"></div>
    <div class="nav-buttons">
      <button class="nav-btn" id="prevBtn">↑</button>
      <button class="nav-btn" id="nextBtn">↓</button>
    </div>
    <button class="reset-btn" id="resetBtn">📍</button>
  </div>

  <script>
    const timetable = {
      Monday: [ ["04:00","05:30","IOI Deep Work (C++/Algo)"],["05:30","06:00","Get ready & travel"],["06:00","13:30","School"],["13:30","14:00","Travel home"],["14:00","14:30","Eat + power nap"],["14:30","15:00","AL Light Revision"],["15:00","19:00","Class"],["19:00","19:30","Dinner"],["19:30","20:30","AL Revision (Past Papers)"],["20:30","21:00","Wind down"],["21:00","23:59","SLEEP"] ],
      Tuesday: [ ["04:00","05:30","IOI Deep Work"],["05:30","06:00","Travel"],["06:00","13:30","School"],["13:30","14:00","Home"],["14:00","14:30","Nap"],["14:30","16:30","AL Intensive"],["16:30","17:00","Break"],["17:00","18:30","Mixed Block"],["18:30","19:30","Dinner"],["19:30","20:30","Recap"],["20:30","21:00","Wind down"],["21:00","23:59","SLEEP"] ],
      Wednesday: [ ["04:00","05:30","IOI Deep Work"],["05:30","06:00","Travel"],["06:00","13:30","School"],["13:30","14:00","Home"],["14:00","14:30","Nap"],["14:30","16:30","AL Intensive"],["16:30","17:00","Break"],["17:00","18:30","Mixed Block"],["18:30","19:30","Dinner"],["19:30","20:30","Recap"],["20:30","21:00","Wind down"],["21:00","23:59","SLEEP"] ],
      Thursday: [ ["04:00","05:30","IOI Deep Work"],["05:30","06:00","Travel"],["06:00","13:30","School"],["13:30","14:00","Home"],["14:00","14:30","Nap"],["14:30","16:30","AL Intensive"],["16:30","17:00","Break"],["17:00","18:30","Mixed Block"],["18:30","19:30","Dinner"],["19:30","20:30","Recap"],["20:30","21:00","Wind down"],["21:00","23:59","SLEEP"] ],
      Friday: [ ["04:00","05:30","IOI Deep Work"],["05:30","06:00","Travel"],["06:00","13:30","School"],["13:30","14:00","Home"],["14:00","14:30","Nap"],["14:30","16:30","AL Intensive"],["16:30","17:00","Break"],["17:00","18:30","Mixed Block"],["18:30","19:30","Dinner"],["19:30","20:30","Recap"],["20:30","21:00","Wind down"],["21:00","23:59","SLEEP"] ],
      Saturday: [ ["06:00","07:30","IOI Heavy Block"],["07:30","08:00","Travel"],["08:00","11:00","Class"],["11:00","11:30","Home"],["11:30","12:30","AL Revision"],["12:30","13:30","Lunch"],["13:30","16:00","IOI Practice"],["16:00","16:30","Break"],["16:30","18:00","AL Hard Subject"],["18:00","19:00","Dinner"],["19:00","20:00","Social/Recap"],["20:00","20:30","Wind down"],["20:30","23:59","SLEEP"] ],
      Sunday: [ ["06:00","08:00","IOI Mock"],["08:00","08:30","Breakfast"],["08:30","11:00","AL Blitz"],["11:00","11:30","Break"],["11:30","12:30","IOI Theory"],["12:30","13:30","Lunch"],["13:30","14:00","Travel"],["14:00","19:00","Class"],["19:00","19:30","Home"],["19:30","20:30","AL Review"],["20:30","21:00","Wind down"],["21:00","23:59","SLEEP"] ]
    };

    const dayOrder = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    let tasks = [];
    let activeIndex = 0;        // which task is currently the middle (focus)
    let touchStartY = 0;
    let swipeThreshold = 40;    // px to trigger swipe

    function timeToMinutes(str) {
      const [h,m] = str.split(':').map(Number);
      return h*60 + m;
    }

    function buildDayTasks(dayName) {
      const raw = timetable[dayName] || [];
      tasks = raw.map(([start, end, text], idx) => ({
        id: idx,
        startMin: timeToMinutes(start),
        endMin: timeToMinutes(end),
        timeRange: `${start} – ${end}`,
        text
      }));
    }

    // Get index of current task by time, or 0 if none
    function getCurrentTaskIndex() {
      const now = new Date();
      const currentMin = now.getHours()*60 + now.getMinutes();
      const found = tasks.findIndex(t => currentMin >= t.startMin && currentMin < t.endMin);
      return found === -1 ? 0 : found;
    }

    function updateCards() {
      const prev = tasks[activeIndex - 1] || null;
      const curr = tasks[activeIndex];
      const next = tasks[activeIndex + 1] || null;

      function fillCard(cardId, task, position) {
        const card = document.getElementById(cardId);
        if (!task) {
          card.style.visibility = 'hidden';
          return;
        }
        card.style.visibility = 'visible';
        card.innerHTML = `
          <span class="card-time">${task.timeRange}</span>
          <div class="task-text">${task.text}</div>
          <span class="status-tag">${position === 'middle' ? 'Now' : (activeIndex > tasks.indexOf(task) ? 'Done' : 'Upcoming')}</span>
        `;
      }

      fillCard('cardTop', prev, 'top');
      fillCard('cardMiddle', curr, 'middle');
      fillCard('cardBottom', next, 'bottom');

      // Update progress
      const now = new Date();
      const currentMin = now.getHours()*60 + now.getMinutes();
      const completed = tasks.filter(t => t.endMin <= currentMin).length;
      const percent = tasks.length ? Math.round((completed / tasks.length)*100) : 0;
      document.getElementById('progressBar').style.width = percent + '%';

      // Disable prev/next buttons at boundaries
      document.getElementById('prevBtn').style.opacity = activeIndex === 0 ? '0.4' : '1';
      document.getElementById('nextBtn').style.opacity = activeIndex === tasks.length-1 ? '0.4' : '1';
    }

    function shiftUp() {
      if (activeIndex > 0) {
        activeIndex--;
        updateCards();
      }
    }

    function shiftDown() {
      if (activeIndex < tasks.length - 1) {
        activeIndex++;
        updateCards();
      }
    }

    function goToCurrent() {
      activeIndex = getCurrentTaskIndex();
      updateCards();
    }

    // Touch / mouse wheel
    const cardsView = document.getElementById('cardsView');
    cardsView.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    });

    cardsView.addEventListener('touchend', (e) => {
      const diff = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(diff) > swipeThreshold) {
        if (diff > 0) shiftUp();   // swipe down → move up (previous task)
        else shiftDown();          // swipe up → move down (next task)
      }
    });

    // Mouse wheel (for desktop)
    cardsView.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (e.deltaY < 0) shiftUp();
      else if (e.deltaY > 0) shiftDown();
    }, { passive: false });

    // Buttons
    document.getElementById('prevBtn').addEventListener('click', shiftUp);
    document.getElementById('nextBtn').addEventListener('click', shiftDown);
    document.getElementById('resetBtn').addEventListener('click', goToCurrent);

    // Keyboard arrows
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp') { shiftUp(); e.preventDefault(); }
      if (e.key === 'ArrowDown') { shiftDown(); e.preventDefault(); }
    });

    // Clock & day update
    function updateDateTime() {
      const now = new Date();
      const dayName = dayOrder[now.getDay()];
      document.getElementById('dateDisplay').textContent = now.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });
      document.getElementById('liveClock').textContent = now.toLocaleTimeString(undefined, { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });

      // If day changed, rebuild and snap to current
      if (dayName !== currentDay) {
        currentDay = dayName;
        buildDayTasks(dayName);
        goToCurrent();
      } else {
        // Update progress bar only (no need to reset focus if user is browsing)
        const currentMin = now.getHours()*60 + now.getMinutes();
        const completed = tasks.filter(t => t.endMin <= currentMin).length;
        const percent = tasks.length ? Math.round((completed / tasks.length)*100) : 0;
        document.getElementById('progressBar').style.width = percent + '%';
      }
    }

    let currentDay = "";
    // Initial setup
    (function init() {
      const now = new Date();
      currentDay = dayOrder[now.getDay()];
      buildDayTasks(currentDay);
      activeIndex = getCurrentTaskIndex();
      updateCards();
      updateDateTime();
      setInterval(updateDateTime, 1000);
    })();
  </script>
</body>
</html>
