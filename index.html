<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>THRENOX – Movable Panels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0b0f1c;
      color: #e0e4ff;
      padding: 1rem;
      min-height: 100vh;
    }
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    h1 {
      color: #a78bfa;
      font-size: 2rem;
    }
    .date {
      color: #9aa3c7;
      margin: 0.25rem 0 0.5rem;
    }
    .live-clock {
      color: #00e5ff;
      font-family: monospace;
      font-size: 1.2rem;
    }

    /* Panel container */
    .panels {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Each movable panel */
    .panel {
      background: rgba(20,24,48,0.7);
      border: 1px solid rgba(124,92,255,0.35);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      transition: box-shadow 0.2s;
    }
    .panel.dragging {
      opacity: 0.7;
      box-shadow: 0 0 30px rgba(124,92,255,0.6);
    }
    .panel-header {
      background: rgba(124,92,255,0.2);
      padding: 0.6rem 1rem;
      cursor: grab;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .panel-header:active {
      cursor: grabbing;
    }
    .panel-title {
      font-weight: 700;
      color: #c7b8ff;
      letter-spacing: 0.02em;
    }
    .panel-body {
      padding: 0.5rem 1rem;
    }
    .task-item {
      padding: 0.4rem 0;
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .task-item:last-child {
      border-bottom: none;
    }
    .task-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: #9aa3c7;
      min-width: 110px;
    }
    .task-text {
      font-size: 0.95rem;
    }
    .past .task-text {
      opacity: 0.6;
    }
    .current .task-text {
      color: #fff;
      font-weight: 600;
    }
    .future .task-text {
      color: #cfd6ff;
    }

    /* Drag placeholder */
    .drag-placeholder {
      border: 2px dashed rgba(124,92,255,0.5);
      border-radius: 12px;
      height: 60px;
      margin: 0.75rem 0;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>THRENOX</h1>
    <div class="date" id="dateDisplay"></div>
    <div class="live-clock" id="liveClock"></div>
  </div>

  <div class="panels" id="panelsContainer">
    <!-- Panels will be inserted here via JS -->
  </div>

  <script>
    // ---------- TIMETABLE DATA ----------
    const timetable = {
      Monday: [
        ["04:00","05:30","IOI Deep Work (C++/Algo)"],
        ["05:30","06:00","Get ready & travel"],
        ["06:00","13:30","School"],
        ["13:30","14:00","Travel home"],
        ["14:00","14:30","Eat + power nap"],
        ["14:30","15:00","AL Light Revision (review notes)"],
        ["15:00","19:00","Class"],
        ["19:00","19:30","Dinner"],
        ["19:30","20:30","AL Revision (heavy/past papers)"],
        ["20:30","21:00","Wind down (no screens)"],
        ["21:00","23:59","SLEEP"]
      ],
      Tuesday: [
        ["04:00","05:30","IOI Deep Work"],
        ["05:30","06:00","Get ready & travel"],
        ["06:00","13:30","School"],
        ["13:30","14:00","Travel home"],
        ["14:00","14:30","Eat + power nap"],
        ["14:30","16:30","AL Intensive Block (hardest subject)"],
        ["16:30","17:00","Break (walk/stretch)"],
        ["17:00","18:30","Mixed Block (2nd AL or light IOI)"],
        ["18:30","19:30","Dinner + quick Discord (optional, 15 min)"],
        ["19:30","20:30","AL Recap & plan tomorrow"],
        ["20:30","21:00","Wind down"],
        ["21:00","23:59","SLEEP"]
      ],
      Wednesday: [
        ["04:00","05:30","IOI Deep Work"],
        ["05:30","06:00","Get ready & travel"],
        ["06:00","13:30","School"],
        ["13:30","14:00","Travel home"],
        ["14:00","14:30","Eat + power nap"],
        ["14:30","16:30","AL Intensive Block (hardest subject)"],
        ["16:30","17:00","Break (walk/stretch)"],
        ["17:00","18:30","Mixed Block (2nd AL or light IOI)"],
        ["18:30","19:30","Dinner + quick Discord (optional, 15 min)"],
        ["19:30","20:30","AL Recap & plan tomorrow"],
        ["20:30","21:00","Wind down"],
        ["21:00","23:59","SLEEP"]
      ],
      Thursday: [
        ["04:00","05:30","IOI Deep Work"],
        ["05:30","06:00","Get ready & travel"],
        ["06:00","13:30","School"],
        ["13:30","14:00","Travel home"],
        ["14:00","14:30","Eat + power nap"],
        ["14:30","16:30","AL Intensive Block (hardest subject)"],
        ["16:30","17:00","Break (walk/stretch)"],
        ["17:00","18:30","Mixed Block (2nd AL or light IOI)"],
        ["18:30","19:30","Dinner + quick Discord (optional, 15 min)"],
        ["19:30","20:30","AL Recap & plan tomorrow"],
        ["20:30","21:00","Wind down"],
        ["21:00","23:59","SLEEP"]
      ],
      Friday: [
        ["04:00","05:30","IOI Deep Work"],
        ["05:30","06:00","Get ready & travel"],
        ["06:00","13:30","School"],
        ["13:30","14:00","Travel home"],
        ["14:00","14:30","Eat + power nap"],
        ["14:30","16:30","AL Intensive Block (hardest subject)"],
        ["16:30","17:00","Break (walk/stretch)"],
        ["17:00","18:30","Mixed Block (2nd AL or light IOI)"],
        ["18:30","19:30","Dinner + quick Discord (optional, 15 min)"],
        ["19:30","20:30","AL Recap & plan tomorrow"],
        ["20:30","21:00","Wind down"],
        ["21:00","23:59","SLEEP"]
      ],
      Saturday: [
        ["06:00","07:30","IOI Heavy Block (problems/mini-contest)"],
        ["07:30","08:00","Get ready & travel (if needed)"],
        ["08:00","11:00","Class"],
        ["11:00","11:30","Travel home"],
        ["11:30","12:30","AL Revision (targeted weak area)"],
        ["12:30","13:30","Lunch/break"],
        ["13:30","16:00","IOI Extended Practice (big coding session)"],
        ["16:00","16:30","Break"],
        ["16:30","18:00","AL Hard Subject (disliked subject)"],
        ["18:00","19:00","Dinner/rest"],
        ["19:00","20:00","Light AL Recap or Social reward (Discord, no games)"],
        ["20:00","20:30","Wind down"],
        ["20:30","23:59","SLEEP"]
      ],
      Sunday: [
        ["06:00","08:00","IOI Mock Contest / Long Problem (timed)"],
        ["08:00","08:30","Breakfast/rest"],
        ["08:30","11:00","AL Blitz (all subjects, past papers, summaries)"],
        ["11:00","11:30","Break"],
        ["11:30","12:30","IOI Theory Deep Dive (no coding, just study)"],
        ["12:30","13:30","Lunch/relax"],
        ["13:30","14:00","Travel to class (if needed)"],
        ["14:00","19:00","Class"],
        ["19:00","19:30","Travel home"],
        ["19:30","20:30","Wind-down AL review (light)"],
        ["20:30","21:00","Wind down"],
        ["21:00","23:59","SLEEP"]
      ]
    };

    const dayOrder = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

    // ---------- HELPER ----------
    function timeToMinutes(str) {
      const [h,m] = str.split(':').map(Number);
      return h*60 + m;
    }

    function getDaySchedule() {
      const now = new Date();
      const dayName = dayOrder[now.getDay()];
      const currentMin = now.getHours()*60 + now.getMinutes();
      const tasks = timetable[dayName].map(([start,end,text]) => ({
        startMin: timeToMinutes(start),
        endMin: timeToMinutes(end),
        timeRange: `${start} – ${end}`,
        text
      }));

      let currentIdx = -1;
      for (let i=0; i<tasks.length; i++) {
        if (currentMin >= tasks[i].startMin && currentMin < tasks[i].endMin) {
          currentIdx = i;
          break;
        }
      }

      const past = tasks.filter((_, idx) => idx < (currentIdx >=0 ? currentIdx : tasks.length));
      const current = currentIdx >=0 ? [tasks[currentIdx]] : [];
      const upcoming = tasks.filter((_, idx) => idx > (currentIdx >=0 ? currentIdx : -1));

      return { dayName, past, current, upcoming };
    }

    // ---------- RENDER PANELS ----------
    function createTaskItem(task, typeClass) {
      const div = document.createElement('div');
      div.className = `task-item ${typeClass}`;
      div.innerHTML = `<span class="task-time">${task.timeRange}</span><span class="task-text">${task.text}</span>`;
      return div;
    }

    function renderPanels() {
      const { dayName, past, current, upcoming } = getDaySchedule();
      const container = document.getElementById('panelsContainer');

      // Save current panel order if any (by panel id)
      const currentOrder = [];
      container.querySelectorAll('.panel').forEach(p => currentOrder.push(p.id));

      container.innerHTML = '';

      // Define panels data
      const panels = [
        { id: 'past', title: '✅ Should have completed by now', tasks: past, typeClass: 'past' },
        { id: 'current', title: '⚡ Doing now', tasks: current, typeClass: 'current' },
        { id: 'upcoming', title: '📋 Upcoming', tasks: upcoming, typeClass: 'future' }
      ];

      // If we had a previous order, sort panels accordingly
      if (currentOrder.length) {
        panels.sort((a,b) => currentOrder.indexOf(a.id) - currentOrder.indexOf(b.id));
      }

      panels.forEach(panel => {
        const panelDiv = document.createElement('div');
        panelDiv.className = 'panel';
        panelDiv.id = panel.id;
        panelDiv.draggable = true;
        panelDiv.innerHTML = `
          <div class="panel-header">
            <span class="panel-title">${panel.title}</span>
            <span style="color:#9aa3c7; font-size:0.8rem;">☰ drag</span>
          </div>
          <div class="panel-body"></div>
        `;
        const body = panelDiv.querySelector('.panel-body');
        panel.tasks.forEach(task => body.appendChild(createTaskItem(task, panel.typeClass)));
        if (panel.tasks.length === 0) {
          body.innerHTML = '<p style="color:#5a6182; padding:0.4rem 0;">Nothing here</p>';
        }
        container.appendChild(panelDiv);
      });

      // Re-attach drag listeners
      attachDragListeners();
    }

    // ---------- DRAG AND DROP (reorder panels) ----------
    let draggedPanel = null;
    let placeholder = null;

    function attachDragListeners() {
      const panels = document.querySelectorAll('.panel');
      panels.forEach(panel => {
        panel.addEventListener('dragstart', handleDragStart);
        panel.addEventListener('dragend', handleDragEnd);
        panel.addEventListener('dragover', handleDragOver);
        panel.addEventListener('dragenter', handleDragEnter);
        panel.addEventListener('dragleave', handleDragLeave);
        panel.addEventListener('drop', handleDrop);
      });
    }

    function handleDragStart(e) {
      draggedPanel = this;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', this.id);
      // Create a visual placeholder
      placeholder = document.createElement('div');
      placeholder.className = 'drag-placeholder';
      placeholder.style.display = 'block';
      this.parentNode.insertBefore(placeholder, this.nextSibling);
      setTimeout(() => { if (draggedPanel) draggedPanel.style.display = 'none'; }, 0);
    }

    function handleDragEnd(e) {
      this.classList.remove('dragging');
      if (placeholder) placeholder.remove();
      if (draggedPanel) draggedPanel.style.display = '';
      draggedPanel = null;
      placeholder = null;
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function handleDragEnter(e) {
      e.preventDefault();
      this.classList.add('drag-over');
    }

    function handleDragLeave(e) {
      this.classList.remove('drag-over');
    }

    function handleDrop(e) {
      e.stopPropagation();
      this.classList.remove('drag-over');
      if (draggedPanel !== this && draggedPanel) {
        const container = document.getElementById('panelsContainer');
        // Insert dragged panel before or after this panel depending on mouse position
        const rect = this.getBoundingClientRect();
        const offset = e.clientY - rect.top;
        if (offset < rect.height / 2) {
          container.insertBefore(draggedPanel, this);
        } else {
          container.insertBefore(draggedPanel, this.nextSibling);
        }
      }
      return false;
    }

    // ---------- LIVE CLOCK & UPDATE ----------
    function updateDateTime() {
      const now = new Date();
      document.getElementById('dateDisplay').textContent = 
        now.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });
      document.getElementById('liveClock').textContent = 
        now.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit', second:'2-digit' });

      // Refresh panels only if the minute changed (to avoid flicker)
      const currentMin = now.getHours()*60 + now.getMinutes();
      if (updateDateTime.lastMin !== currentMin) {
        updateDateTime.lastMin = currentMin;
        renderPanels();
      }
    }
    updateDateTime.lastMin = -1;

    // Initial render
    renderPanels();
    updateDateTime();
    setInterval(updateDateTime, 1000);
  </script>
</body>
</html>
