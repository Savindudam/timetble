<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>THRENOX – Focus Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f7f3ee;
      color: #2d2a26;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ========== SIDEBAR ========== */
    .sidebar {
      width: 200px;
      background: #f0ebe3;
      border-right: 1px solid #dbd1c6;
      display: flex;
      flex-direction: column;
      padding: 2rem 0;
      flex-shrink: 0;
      z-index: 20;
    }

    .sidebar-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      text-align: center;
      color: #2d2a26;
      margin-bottom: 2rem;
      letter-spacing: 0.03em;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0 1rem;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: #5c5348;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      width: 100%;
    }

    .sidebar-btn:hover {
      background: rgba(176,137,104,0.1);
      color: #2d2a26;
    }

    .sidebar-btn.active {
      background: #e6d9cc;
      color: #2d2a26;
      font-weight: 600;
    }

    .sidebar-icon {
      font-size: 1.2rem;
      width: 24px;
      text-align: center;
    }

    /* ========== MAIN AREA ========== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 1.5rem 1rem 0.5rem;
      background: #f7f3ee;
      z-index: 10;
      flex-shrink: 0;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      color: #2d2a26;
    }

    .date { font-size: 0.85rem; color: #6b625a; margin: 0.2rem 0; }
    .live-clock {
      font-size: 0.9rem;
      background: #eae3db;
      padding: 0.25rem 1rem;
      border-radius: 20px;
      color: #6b625a;
      margin-top: 0.3rem;
      display: inline-block;
    }

    /* ========== VIEWS CONTAINER ========== */
    .view {
      flex: 1;
      overflow: hidden;
      display: none;
    }
    .view.active {
      display: flex;
      flex-direction: column;
    }

    /* ========== TIMETABLE VIEW ========== */
    .scroll-view {
      flex: 1;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: thin;
      scrollbar-color: #c4b7a6 transparent;
      padding: 30vh 0;
    }
    .scroll-view::-webkit-scrollbar { width: 5px; }
    .scroll-view::-webkit-scrollbar-track { background: transparent; }
    .scroll-view::-webkit-scrollbar-thumb { background: #c4b7a6; border-radius: 10px; }

    .cards-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      max-width: 500px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .card {
      width: 100%;
      min-height: 130px;
      background: white;
      border-radius: 28px;
      padding: 1.8rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      scroll-snap-align: center;
      transition: all 0.35s cubic-bezier(0.25, 1, 0.3, 1);
      opacity: 0.4;
      transform: scale(0.85);
      border: 1px solid rgba(0,0,0,0.04);
      cursor: pointer;
      position: relative;
    }

    .card.focused {
      opacity: 1;
      transform: scale(1.08);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      border-color: #d9c9b6;
    }

    .card-time {
      font-weight: 700;
      font-size: 0.85rem;
      color: #b08968;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
      display: block;
    }

    .task-text {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.4;
      color: #2d2a26;
    }

    .card.focused .task-text {
      font-size: 1.45rem;
      font-weight: 700;
    }

    .status-badge {
      position: absolute;
      top: 1rem;
      right: 1.2rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      background: #f1ede8;
      color: #8c7b6b;
      letter-spacing: 0.04em;
    }
    .card.focused .status-badge {
      background: #e6d9cc;
      color: #6b5241;
    }

    /* ========== TO-DO VIEW ========== */
    .todo-view {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    .todo-view h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      margin-bottom: 1rem;
      color: #2d2a26;
    }

    .todo-input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .todo-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #dbd1c6;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      background: white;
      color: #2d2a26;
      outline: none;
    }

    .todo-input:focus {
      border-color: #b08968;
    }

    .todo-add-btn {
      padding: 0.75rem 1.2rem;
      background: #b08968;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .todo-add-btn:hover {
      background: #9a7559;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1rem;
      background: white;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.04);
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .todo-checkbox {
      width: 20px;
      height: 20px;
      accent-color: #b08968;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d2a26;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .todo-delete {
      background: none;
      border: none;
      color: #c4b7a6;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem;
      transition: color 0.2s;
    }

    .todo-delete:hover {
      color: #8c7b6b;
    }

    /* ========== RESET BUTTON ========== */
    .reset-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #b08968;
      color: white;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(176,137,104,0.4);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .reset-btn:hover {
      transform: scale(1.08);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 600px) {
      .sidebar {
        width: 60px;
        padding: 1.5rem 0.5rem;
      }
      .sidebar-btn {
        justify-content: center;
        padding: 0.75rem 0;
      }
      .sidebar-btn span:not(.sidebar-icon) {
        display: none;
      }
      .sidebar-logo {
        font-size: 1rem;
      }
      .todo-view {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">THRENOX</div>
    <nav class="sidebar-nav">
      <button class="sidebar-btn active" data-view="timetable">
        <span class="sidebar-icon">📅</span>
        <span>Timetable</span>
      </button>
      <button class="sidebar-btn" data-view="todo">
        <span class="sidebar-icon">✅</span>
        <span>To Do</span>
      </button>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="header">
      <div class="date" id="dateDisplay"></div>
      <div class="live-clock" id="liveClock"></div>
    </div>

    <!-- TIMETABLE VIEW -->
    <div class="view active" id="timetableView">
      <div class="scroll-view" id="scrollView">
        <div class="cards-container" id="cardsContainer">
          <!-- Cards injected here -->
        </div>
      </div>
    </div>

    <!-- TO DO VIEW -->
    <div class="view" id="todoView">
      <div class="todo-view">
        <h2>To Do</h2>
        <div class="todo-input-row">
          <input type="text" class="todo-input" id="todoInput" placeholder="Add a new task...">
          <button class="todo-add-btn" id="todoAddBtn">Add</button>
        </div>
        <ul class="todo-list" id="todoList"></ul>
      </div>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn" title="Back to current task">📍</button>

  <script>
    // ========== TIMETABLE DATA ==========
    const timetable = {
      Monday: [ ["04:00","05:30","IOI Deep Work (C++/Algo)"],["05:30","06:00","Get ready & travel"],["06:00","13:30","School"],["13:30","14:00","Travel home"],["14:00","14:30","Eat + power nap"],["14:30","15:00","AL Light Revision"],["15:00","19:00","Class"],["19:00","19:30","Dinner"],["19:30","20:30","AL Revision (Past Papers)"],["20:30","21:00","Wind down"],["21:00","23:59","SLEEP"] ],
      Tuesday: [ ["04:00","05:30","IOI Deep Work"],["05:30","06:00","Travel"],["06:00","13:30","School"],["13:30","14:00","Home"],["14:00","14:30","Nap"],["14:30","16:30","AL Intensive"],["16:30","17:00","Break"],["17:00","18:30","Mixed Block"],["18:30","19:30","Dinner"],["19:30","20:30","Recap"],["20:30","21:00","Wind down"],["21:00","23:59","SLEEP"] ],
      Wednesday: [ ["04:00","05:30","IOI Deep Work"],["05:30","06:00","Travel"],["06:00","13:30","School"],["13:30","14:00","Home"],["14:00","14:30","Nap"],["14:30","16:30","AL Intensive"],["16:30","17:00","Break"],["17:00","18:30","Mixed Block"],["18:30","19:30","Dinner"],["19:30","20:30","Recap"],["20:30","21:00","Wind down"],["21:00","23:59","SLEEP"] ],
      Thursday: [ ["04:00","05:30","IOI Deep Work"],["05:30","06:00","Travel"],["06:00","13:30","School"],["13:30","14:00","Home"],["14:00","14:30","Nap"],["14:30","16:30","AL Intensive"],["16:30","17:00","Break"],["17:00","18:30","Mixed Block"],["18:30","19:30","Dinner"],["19:30","20:30","Recap"],["20:30","21:00","Wind down"],["21:00","23:59","SLEEP"] ],
      Friday: [ ["04:00","05:30","IOI Deep Work"],["05:30","06:00","Travel"],["06:00","13:30","School"],["13:30","14:00","Home"],["14:00","14:30","Nap"],["14:30","16:30","AL Intensive"],["16:30","17:00","Break"],["17:00","18:30","Mixed Block"],["18:30","19:30","Dinner"],["19:30","20:30","Recap"],["20:30","21:00","Wind down"],["21:00","23:59","SLEEP"] ],
      Saturday: [ ["06:00","07:30","IOI Heavy Block"],["07:30","08:00","Travel"],["08:00","11:00","Class"],["11:00","11:30","Home"],["11:30","12:30","AL Revision"],["12:30","13:30","Lunch"],["13:30","16:00","IOI Practice"],["16:00","16:30","Break"],["16:30","18:00","AL Hard Subject"],["18:00","19:00","Dinner"],["19:00","20:00","Social/Recap"],["20:00","20:30","Wind down"],["20:30","23:59","SLEEP"] ],
      Sunday: [ ["06:00","08:00","IOI Mock"],["08:00","08:30","Breakfast"],["08:30","11:00","AL Blitz"],["11:00","11:30","Break"],["11:30","12:30","IOI Theory"],["12:30","13:30","Lunch"],["13:30","14:00","Travel"],["14:00","19:00","Class"],["19:00","19:30","Home"],["19:30","20:30","AL Review"],["20:30","21:00","Wind down"],["21:00","23:59","SLEEP"] ]
    };

    const dayOrder = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    let tasks = [];
    let currentDay = "";

    function timeToMinutes(str) {
      const [h,m] = str.split(':').map(Number);
      return h*60 + m;
    }

    // ========== TIMETABLE BUILD ==========
    function buildPanels() {
      const container = document.getElementById('cardsContainer');
      container.innerHTML = '';
      const raw = timetable[currentDay] || [];
      tasks = raw.map(([start, end, text], idx) => ({
        id: idx,
        startMin: timeToMinutes(start),
        endMin: timeToMinutes(end),
        timeRange: `${start} – ${end}`,
        text
      }));

      tasks.forEach(task => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `task-${task.id}`;
        card.dataset.taskId = task.id;
        card.innerHTML = `
          <span class="status-badge">Upcoming</span>
          <span class="card-time">${task.timeRange}</span>
          <div class="task-text">${task.text}</div>
        `;
        card.onclick = () => card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        container.appendChild(card);
      });

      setTimeout(() => {
        updateFocusFromScroll();
        setTimeout(focusCurrentTask, 200);
      }, 100);
    }

    function getCurrentTaskIndex() {
      const now = new Date();
      const currentMin = now.getHours()*60 + now.getMinutes();
      const idx = tasks.findIndex(t => currentMin >= t.startMin && currentMin < t.endMin);
      return idx === -1 ? 0 : idx;
    }

    function focusCurrentTask() {
      const idx = getCurrentTaskIndex();
      const target = document.getElementById(`task-${idx}`) || document.querySelector('.card');
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function updateFocusFromScroll() {
      const scrollView = document.getElementById('scrollView');
      const cards = document.querySelectorAll('.card');
      if (cards.length === 0) return;

      const containerRect = scrollView.getBoundingClientRect();
      const centerY = containerRect.top + containerRect.height / 2;

      let closestCard = null;
      let closestDistance = Infinity;

      cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const cardCenter = rect.top + rect.height / 2;
        const distance = Math.abs(cardCenter - centerY);

        if (distance < closestDistance) {
          closestDistance = distance;
          closestCard = card;
        }
      });

      // Update focused class
      cards.forEach(c => c.classList.remove('focused'));
      if (closestCard) {
        closestCard.classList.add('focused');
        // Update status badge
        const taskId = parseInt(closestCard.dataset.taskId);
        const currentIdx = getCurrentTaskIndex();
        const badge = closestCard.querySelector('.status-badge');
        if (taskId === currentIdx) {
          badge.textContent = 'Now';
          badge.style.background = '#e6d9cc';
          badge.style.color = '#6b5241';
        } else if (taskId < currentIdx) {
          badge.textContent = 'Done';
          badge.style.background = '#f1ede8';
          badge.style.color = '#8c7b6b';
        } else {
          badge.textContent = 'Upcoming';
          badge.style.background = '#f1ede8';
          badge.style.color = '#8c7b6b';
        }
      }
    }

    // ========== SIDEBAR NAVIGATION ==========
    const sidebarBtns = document.querySelectorAll('.sidebar-btn');
    const views = {
      timetable: document.getElementById('timetableView'),
      todo: document.getElementById('todoView')
    };

    sidebarBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        // Update active button
        sidebarBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Show corresponding view
        const viewName = btn.dataset.view;
        Object.values(views).forEach(v => v.classList.remove('active'));
        views[viewName].classList.add('active');

        // Hide reset button on non-timetable views
        document.getElementById('resetBtn').style.display = viewName === 'timetable' ? 'flex' : 'none';

        // If switching to timetable, recalculate focus
        if (viewName === 'timetable') {
          setTimeout(updateFocusFromScroll, 100);
        }
      });
    });

    // ========== TO DO LOGIC ==========
    const TODO_KEY = 'threnox_todos';

    function loadTodos() {
      try {
        return JSON.parse(localStorage.getItem(TODO_KEY)) || [];
      } catch (e) {
        return [];
      }
    }

    function saveTodos(todos) {
      localStorage.setItem(TODO_KEY, JSON.stringify(todos));
    }

    function renderTodos() {
      const list = document.getElementById('todoList');
      const todos = loadTodos();
      list.innerHTML = '';

      todos.forEach((todo, idx) => {
        const li = document.createElement('li');
        li.className = 'todo-item';
        if (todo.done) li.classList.add('done');

        li.innerHTML = `
          <input type="checkbox" class="todo-checkbox" ${todo.done ? 'checked' : ''}>
          <span class="todo-text">${escapeHtml(todo.text)}</span>
          <button class="todo-delete">✕</button>
        `;

        // Checkbox toggle
        li.querySelector('.todo-checkbox').addEventListener('change', (e) => {
          const todos = loadTodos();
          todos[idx].done = e.target.checked;
          saveTodos(todos);
          renderTodos();
        });

        // Delete
        li.querySelector('.todo-delete').addEventListener('click', () => {
          const todos = loadTodos();
          todos.splice(idx, 1);
          saveTodos(todos);
          renderTodos();
        });

        list.appendChild(li);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('todoAddBtn').addEventListener('click', () => {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      const todos = loadTodos();
      todos.push({ text, done: false });
      saveTodos(todos);
      input.value = '';
      renderTodos();
    });

    document.getElementById('todoInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('todoAddBtn').click();
      }
    });

    // ========== CLOCK & DATE ==========
    function updateDateTime() {
      const now = new Date();
      const dayName = dayOrder[now.getDay()];
      document.getElementById('dateDisplay').textContent = now.toLocaleDateString(undefined, {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      document.getElementById('liveClock').textContent = now.toLocaleTimeString(undefined, {
        hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
      });

      if (dayName !== currentDay) {
        currentDay = dayName;
        buildPanels();
      }
    }

    // ========== SCROLL LISTENER FOR FOCUS ==========
    const scrollView = document.getElementById('scrollView');
    let scrollTimeout;
    scrollView.addEventListener('scroll', () => {
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(updateFocusFromScroll, 50);
    });

    // ========== RESET BUTTON ==========
    document.getElementById('resetBtn').addEventListener('click', () => {
      // Switch to timetable view if not already
      if (!views.timetable.classList.contains('active')) {
        sidebarBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-view="timetable"]').classList.add('active');
        Object.values(views).forEach(v => v.classList.remove('active'));
        views.timetable.classList.add('active');
        document.getElementById('resetBtn').style.display = 'flex';
      }
      focusCurrentTask();
    });

    // ========== INIT ==========
    function init() {
      const now = new Date();
      currentDay = dayOrder[now.getDay()];
      buildPanels();
      updateDateTime();
      renderTodos();
      setInterval(updateDateTime, 1000);
    }

    init();
  </script>
</body>
</html>
