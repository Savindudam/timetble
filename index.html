<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>THRENOX – Daily Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #f7f3ee;  /* warm off-white */
      color: #2d2a26;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 1.5rem 1rem 1rem;
      background: #f7f3ee;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      letter-spacing: 0.03em;
      color: #2d2a26;
      margin-bottom: 0.25rem;
    }

    .date {
      font-size: 0.9rem;
      color: #6b625a;
      margin-bottom: 0.3rem;
    }

    .live-clock {
      font-family: 'Inter', monospace;
      font-size: 1rem;
      color: #8c7b6b;
      background: #eae3db;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      display: inline-block;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 0.8rem;
      width: 80%;
      max-width: 400px;
      background: #e0d6cc;
      border-radius: 10px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #b08968;
      width: 0%;
      transition: width 0.5s ease;
    }

    .progress-text {
      font-size: 0.7rem;
      color: #6b625a;
      margin-top: 0.2rem;
      text-align: center;
    }

    /* Scroll container */
    .panels-wrapper {
      flex: 1;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      padding: 25vh 0;
      scrollbar-width: thin;
      scrollbar-color: #c4b7a6 transparent;
    }

    .panels-wrapper::-webkit-scrollbar {
      width: 6px;
    }
    .panels-wrapper::-webkit-scrollbar-track {
      background: transparent;
    }
    .panels-wrapper::-webkit-scrollbar-thumb {
      background: #c4b7a6;
      border-radius: 10px;
    }

    .panels-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      max-width: 500px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* Panel card */
    .panel {
      width: 100%;
      background: white;
      border-radius: 24px;
      padding: 1.8rem 1.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.02);
      scroll-snap-align: center;
      transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
      opacity: 0.6;
      transform: scale(0.92);
      position: relative;
      border: 1px solid rgba(0,0,0,0.04);
      user-select: none;
    }

    /* Focused panel */
    .panel.focused {
      opacity: 1;
      transform: scale(1.02);
      box-shadow: 0 15px 40px rgba(0,0,0,0.08), 0 5px 15px rgba(0,0,0,0.04);
      border-color: #d9c9b6;
      background: #ffffff;
    }

    .panel-time {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: #b08968;
      display: block;
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .task-text {
      font-size: 1.3rem;
      font-weight: 600;
      line-height: 1.4;
      color: #2d2a26;
    }

    .panel.focused .task-text {
      color: #1a1815;
    }

    /* Status tag */
    .status-tag {
      position: absolute;
      top: 1.2rem;
      right: 1.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.25rem 0.7rem;
      border-radius: 30px;
      background: #f1ede8;
      color: #8c7b6b;
    }

    .panel.focused .status-tag {
      background: #e6d9cc;
      color: #6b5241;
    }

    /* Reset button */
    .controls {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 100;
    }

    .reset-btn {
      background: #ffffff;
      border: 1px solid #d9c9b6;
      color: #2d2a26;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      background: #f5efe8;
      transform: scale(1.05);
    }

    /* Responsive */
    @media (max-width: 500px) {
      .panel {
        padding: 1.5rem 1.2rem;
      }
      .task-text {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>THRENOX</h1>
    <div class="date" id="dateDisplay"></div>
    <div class="live-clock" id="liveClock"></div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 0 tasks completed</div>
  </div>

  <div class="panels-wrapper" id="scrollWrapper">
    <div class="panels-container" id="panelsContainer">
      <!-- Panels injected here -->
    </div>
  </div>

  <div class="controls">
    <button class="reset-btn" id="resetBtn" title="Back to current task">📍</button>
  </div>

  <script>
    const timetable = {
      Monday: [
        ["04:00","05:30","IOI Deep Work (C++/Algo)"],
        ["05:30","06:00","Get ready & travel"],
        ["06:00","13:30","School"],
        ["13:30","14:00","Travel home"],
        ["14:00","14:30","Eat + power nap"],
        ["14:30","15:00","AL Light Revision"],
        ["15:00","19:00","Class"],
        ["19:00","19:30","Dinner"],
        ["19:30","20:30","AL Revision (Past Papers)"],
        ["20:30","21:00","Wind down"],
        ["21:00","23:59","SLEEP"]
      ],
      Tuesday: [
        ["04:00","05:30","IOI Deep Work"],
        ["05:30","06:00","Travel"],
        ["06:00","13:30","School"],
        ["13:30","14:00","Home"],
        ["14:00","14:30","Nap"],
        ["14:30","16:30","AL Intensive"],
        ["16:30","17:00","Break"],
        ["17:00","18:30","Mixed Block"],
        ["18:30","19:30","Dinner"],
        ["19:30","20:30","Recap"],
        ["20:30","21:00","Wind down"],
        ["21:00","23:59","SLEEP"]
      ],
      Wednesday: [
        ["04:00","05:30","IOI Deep Work"],
        ["05:30","06:00","Travel"],
        ["06:00","13:30","School"],
        ["13:30","14:00","Home"],
        ["14:00","14:30","Nap"],
        ["14:30","16:30","AL Intensive"],
        ["16:30","17:00","Break"],
        ["17:00","18:30","Mixed Block"],
        ["18:30","19:30","Dinner"],
        ["19:30","20:30","Recap"],
        ["20:30","21:00","Wind down"],
        ["21:00","23:59","SLEEP"]
      ],
      Thursday: [
        ["04:00","05:30","IOI Deep Work"],
        ["05:30","06:00","Travel"],
        ["06:00","13:30","School"],
        ["13:30","14:00","Home"],
        ["14:00","14:30","Nap"],
        ["14:30","16:30","AL Intensive"],
        ["16:30","17:00","Break"],
        ["17:00","18:30","Mixed Block"],
        ["18:30","19:30","Dinner"],
        ["19:30","20:30","Recap"],
        ["20:30","21:00","Wind down"],
        ["21:00","23:59","SLEEP"]
      ],
      Friday: [
        ["04:00","05:30","IOI Deep Work"],
        ["05:30","06:00","Travel"],
        ["06:00","13:30","School"],
        ["13:30","14:00","Home"],
        ["14:00","14:30","Nap"],
        ["14:30","16:30","AL Intensive"],
        ["16:30","17:00","Break"],
        ["17:00","18:30","Mixed Block"],
        ["18:30","19:30","Dinner"],
        ["19:30","20:30","Recap"],
        ["20:30","21:00","Wind down"],
        ["21:00","23:59","SLEEP"]
      ],
      Saturday: [
        ["06:00","07:30","IOI Heavy Block"],
        ["07:30","08:00","Travel"],
        ["08:00","11:00","Class"],
        ["11:00","11:30","Home"],
        ["11:30","12:30","AL Revision"],
        ["12:30","13:30","Lunch"],
        ["13:30","16:00","IOI Practice"],
        ["16:00","16:30","Break"],
        ["16:30","18:00","AL Hard Subject"],
        ["18:00","19:00","Dinner"],
        ["19:00","20:00","Social/Recap"],
        ["20:00","20:30","Wind down"],
        ["20:30","23:59","SLEEP"]
      ],
      Sunday: [
        ["06:00","08:00","IOI Mock"],
        ["08:00","08:30","Breakfast"],
        ["08:30","11:00","AL Blitz"],
        ["11:00","11:30","Break"],
        ["11:30","12:30","IOI Theory"],
        ["12:30","13:30","Lunch"],
        ["13:30","14:00","Travel"],
        ["14:00","19:00","Class"],
        ["19:00","19:30","Home"],
        ["19:30","20:30","AL Review"],
        ["20:30","21:00","Wind down"],
        ["21:00","23:59","SLEEP"]
      ]
    };

    const dayOrder = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    let currentDay = "";
    let tasks = [];

    function timeToMinutes(str) {
      const [h,m] = str.split(':').map(Number);
      return h*60 + m;
    }

    function updateDateTime() {
      const now = new Date();
      const dayName = dayOrder[now.getDay()];
      document.getElementById('dateDisplay').textContent = now.toLocaleDateString(undefined, { 
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
      });
      document.getElementById('liveClock').textContent = now.toLocaleTimeString(undefined, { 
        hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' 
      });

      if (dayName !== currentDay) {
        currentDay = dayName;
        buildPanels();
      }
      updateProgress();
    }

    function buildPanels() {
      const container = document.getElementById('panelsContainer');
      container.innerHTML = '';
      const raw = timetable[currentDay] || [];
      tasks = raw.map(([start, end, text], idx) => ({
        id: idx,
        startMin: timeToMinutes(start),
        endMin: timeToMinutes(end),
        timeRange: `${start} – ${end}`,
        text
      }));

      tasks.forEach(task => {
        const panel = document.createElement('div');
        panel.className = 'panel';
        panel.id = `task-${task.id}`;
        panel.dataset.id = task.id;
        panel.innerHTML = `
          <span class="status-tag">Upcoming</span>
          <span class="panel-time">${task.timeRange}</span>
          <div class="task-text">${task.text}</div>
        `;
        panel.addEventListener('click', () => {
          panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
        container.appendChild(panel);
      });
      setTimeout(focusCurrentTask, 100);
    }

    function getCurrentTaskIndex() {
      const now = new Date();
      const currentMin = now.getHours()*60 + now.getMinutes();
      return tasks.findIndex(t => currentMin >= t.startMin && currentMin < t.endMin);
    }

    function focusCurrentTask() {
      const idx = getCurrentTaskIndex();
      if (idx !== -1) {
        const el = document.getElementById(`task-${idx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } else {
        const first = document.querySelector('.panel');
        if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    // Intersection Observer
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('focused'));
          entry.target.classList.add('focused');
          const taskId = parseInt(entry.target.dataset.id);
          const currentIdx = getCurrentTaskIndex();
          const tag = entry.target.querySelector('.status-tag');
          if (taskId === currentIdx) {
            tag.textContent = "Current";
            tag.style.color = "#6b5241";
          } else if (taskId < currentIdx) {
            tag.textContent = "Done";
            tag.style.color = "#8c7b6b";
          } else {
            tag.textContent = "Upcoming";
            tag.style.color = "#8c7b6b";
          }
        }
      });
    }, { root: document.getElementById('scrollWrapper'), threshold: 0.6 });

    function observePanels() {
      document.querySelectorAll('.panel').forEach(p => observer.observe(p));
    }

    // Progress bar
    function updateProgress() {
      const now = new Date();
      const currentMin = now.getHours()*60 + now.getMinutes();
      const totalTasks = tasks.length;
      const completedCount = tasks.filter(t => t.endMin <= currentMin).length;
      const percent = totalTasks ? Math.round((completedCount / totalTasks) * 100) : 0;
      document.getElementById('progressBar').style.width = percent + '%';
      document.getElementById('progressText').textContent = `${completedCount} / ${totalTasks} tasks done`;
    }

    document.getElementById('resetBtn').addEventListener('click', focusCurrentTask);

    // Start
    updateDateTime();
    setInterval(updateDateTime, 1000);
    // observe panels after first build
    setTimeout(observePanels, 200);
  </script>
</body>
</html>
